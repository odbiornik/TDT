; PlatformIO Project Configuration File
;
; upload_port below is only for flashing firmware from PlatformIO.
; The Python host application discovers the runtime serial port dynamically.

[env:m5stack-atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified
    adafruit/Adafruit NeoPixel
    bblanchon/ArduinoJson
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
